name: Deploy Astro Shree Hari to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: astro-shree-hari-source/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: astro-shree-hari-source
        env:
          npm_config_cache: /tmp/npm-cache
          TMPDIR: /tmp

      - name: Build frontend (Vite)
        run: npm run build
        working-directory: astro-shree-hari-source

      - name: Copy Vite build output to root
        run: |
          cp -r astro-shree-hari-source/dist/* .

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
