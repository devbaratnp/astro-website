<!doctype html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>प्रशासक लगइन — श्रीहरि ज्योतिष</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-symbol">ॐ</div>
    <h1>Admin login</h1>
    <p class="login-subtitle">Shreehari management system</p>
    <div id="loginError" class="admin-error" style="display:none"></div>
    <form id="loginForm">
      <label>
        Username
        <input type="text" id="username" required autocomplete="username">
      </label>
      <label>
        Password
        <input type="password" id="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn-primary">Log in</button>
    </form>
    <a href="/" class="back-link">← Back to website</a>
  </div>
  <script src="js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initLogin);</script>
</body>
</html>
